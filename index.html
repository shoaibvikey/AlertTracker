<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Tracker</title>
    <style>
        :root {
            --primary: #2563eb;
            --background: #f1f5f9;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #dc2626;
            --warning: #ca8a04;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 95vh;
        }

        .container {
            max-width: 1400px; /* Increased to accommodate side-by-side */
            margin: 0 auto;
            flex: 1;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }

        /* Two-Column Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr; /* Left side takes 60%, right takes 40% */
            gap: 25px;
            align-items: start; /* Prevents stretching */
        }

        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr; /* Stacks to single column on smaller screens */
            }
        }

        /* Form Section */
        .input-section {
            background-color: var(--surface);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 180px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background-color: #fff;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            height: 40px;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        #submitBtn {
            min-width: 120px;
        }

        /* Dashboard Section */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--surface);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            margin-top: 0;
            font-size: 18px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-count {
            font-weight: bold;
            color: var(--primary);
            background: #e0e7ff;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .priority-p0 { color: #dc2626; font-weight: bold; }
        .priority-p1 { color: #ea580c; font-weight: bold;}
        .priority-p2 { color: #ca8a04; font-weight: bold;}
        .priority-p3 { color: #16a34a; font-weight: bold;}

        /* Table Section */
        .log-card {
            max-height: calc(100vh - 160px); /* Keeps it on screen */
            overflow-y: auto; /* Adds inner scrollbar if too many items */
            position: sticky;
            top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        th {
            background-color: #f8fafc;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            height: auto;
            margin-right: 5px;
        }

        .edit-btn {
            background-color: var(--warning);
        }
        .edit-btn:hover { background-color: #a16207; }

        .delete-btn {
            background-color: var(--danger);
        }
        .delete-btn:hover { background-color: #b91c1c; }

        .empty-state {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
            color: var(--text-muted);
            font-size: 14px;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Alert Tracker</h1>

    <div class="main-layout">
        
        <!-- Left Column: Inputs & Summaries -->
        <div class="left-column">
            
            <!-- Input Form -->
            <div class="input-section">
                <div class="form-group">
                    <label for="queueSelect">Select Queue</label>
                    <select id="queueSelect">
                        <!-- Image 1 Queues -->
                        <option value="Originations Core Eng.">Originations Core Eng.</option>
                        <option value="Consumer Core Services">Consumer Core Services</option>
                        <option value="Underwriting Platform">Underwriting Platform</option>
                        <option value="LC Website">LC Website</option>
                        <option value="UFE">UFE</option>
                        <option value="MAS - Alchemy">MAS - Alchemy</option>
                        <option value="Infrastructure">Infrastructure</option>
                        <option value="LCX-eng">LCX-eng</option>
                        <option value="Autorefi">Autorefi</option>
                        <option value="EBOPS">EBOPS</option>
                        <!-- Image 2 Queues -->
                        <option value="Credit Decision Services">Credit Decision Services</option>
                        <option value="DAP Core">DAP Core</option>
                        <option value="Mas General">Mas General</option>
                        <option value="UWOPS">UWOPS</option>
                        <option value="Investor Servicing">Investor Servicing</option>
                        <option value="Purchase Finance">Purchase Finance</option>
                        <option value="Platform_Architecture">Platform_Architecture</option>
                        <option value="Investor Trading">Investor Trading</option>
                        <option value="Shaw-Spectrum">Shaw-Spectrum</option>
                        <option value="Federation Interfaces">Federation Interfaces</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="prioritySelect">Priority</label>
                    <select id="prioritySelect">
                        <option value="P0">P0</option>
                        <option value="P1">P1</option>
                        <option value="P2">P2</option>
                        <option value="P3">P3</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="statusSelect">Status</label>
                    <select id="statusSelect">
                        <option value="Assigned">Assigned</option>
                        <option value="Escalated">Escalated</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>

                <button id="submitBtn" onclick="handleAddOrUpdate()">Add Alert</button>
            </div>

            <!-- Counters Dashboard -->
            <div class="dashboard">
                <!-- Status Counters -->
                <div class="card">
                    <h2>Status Summary</h2>
                    <div id="statusList"></div>
                </div>

                <!-- Priority Counters -->
                <div class="card">
                    <h2>Priority Summary</h2>
                    <div id="priorityList"></div>
                </div>

                <!-- Queue Counters -->
                <div class="card">
                    <h2>Queue Summary</h2>
                    <div id="queueList"></div>
                </div>
            </div>
        </div>

        <!-- Right Column: Alert Logs -->
        <div class="right-column">
            <div class="card log-card">
                <h2>Recent Alerts Log</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Queue</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="alertTableBody">
                        <!-- Rows will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
        
    </div>
</div>

<footer>
    Made with ❤️ By Shoaib Akhtar
</footer>

<script>
    // State
    let alerts = [];
    let editingId = null; 

    document.addEventListener("DOMContentLoaded", updateDashboard);

    function handleAddOrUpdate() {
        const queue = document.getElementById("queueSelect").value;
        const priority = document.getElementById("prioritySelect").value;
        const status = document.getElementById("statusSelect").value;

        if (editingId !== null) {
            const index = alerts.findIndex(a => a.id === editingId);
            if (index !== -1) {
                alerts[index] = { id: editingId, queue, priority, status };
            }
            editingId = null;
            document.getElementById("submitBtn").innerText = "Add Alert";
        } else {
            const newAlert = {
                id: Date.now().toString(),
                queue: queue,
                priority: priority,
                status: status
            };
            alerts.push(newAlert);
        }
        updateDashboard();
    }

    function editAlert(id) {
        const alertToEdit = alerts.find(a => a.id === id);
        
        if (alertToEdit) {
            document.getElementById("queueSelect").value = alertToEdit.queue;
            document.getElementById("prioritySelect").value = alertToEdit.priority;
            document.getElementById("statusSelect").value = alertToEdit.status;
            
            editingId = id;
            document.getElementById("submitBtn").innerText = "Update Alert";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function deleteAlert(id) {
        if(confirm("Are you sure you want to delete this alert?")) {
            alerts = alerts.filter(a => a.id !== id);
            if (editingId === id) {
                editingId = null;
                document.getElementById("submitBtn").innerText = "Add Alert";
            }
            updateDashboard();
        }
    }

    function updateDashboard() {
        let queueCounts = {};
        let priorityCounts = { "P0": 0, "P1": 0, "P2": 0, "P3": 0 };
        let statusCounts = { "Assigned": 0, "Escalated": 0, "Closed": 0 };

        alerts.forEach(alert => {
            queueCounts[alert.queue] = (queueCounts[alert.queue] || 0) + 1;
            priorityCounts[alert.priority]++;
            statusCounts[alert.status]++;
        });

        document.getElementById("statusList").innerHTML = Object.keys(statusCounts).map(status => `
            <div class="stat-row">
                <span>${status}</span>
                <span class="stat-count">${statusCounts[status]}</span>
            </div>
        `).join('');

        document.getElementById("priorityList").innerHTML = Object.keys(priorityCounts).map(priority => `
            <div class="stat-row">
                <span class="priority-${priority.toLowerCase()}">${priority}</span>
                <span class="stat-count">${priorityCounts[priority]}</span>
            </div>
        `).join('');

        const queueContainer = document.getElementById("queueList");
        if (Object.keys(queueCounts).length === 0) {
            queueContainer.innerHTML = '<div class="stat-row" style="color: var(--text-muted);">No alerts logged yet.</div>';
        } else {
            const sortedQueues = Object.entries(queueCounts).sort((a, b) => b[1] - a[1]);
            queueContainer.innerHTML = sortedQueues.map(([queue, count]) => `
                <div class="stat-row">
                    <span>${queue}</span>
                    <span class="stat-count">${count}</span>
                </div>
            `).join('');
        }

        const tableBody = document.getElementById("alertTableBody");
        if (alerts.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="4" class="empty-state">No alerts recorded yet.</td></tr>`;
        } else {
            const reversedAlerts = [...alerts].reverse();
            tableBody.innerHTML = reversedAlerts.map(alert => `
                <tr>
                    <td>${alert.queue}</td>
                    <td class="priority-${alert.priority.toLowerCase()}">${alert.priority}</td>
                    <td>${alert.status}</td>
                    <td>
                        <button class="action-btn edit-btn" onclick="editAlert('${alert.id}')">Edit</button>
                        <button class="action-btn delete-btn" onclick="deleteAlert('${alert.id}')">Del</button>
                    </td>
                </tr>
            `).join('');
        }
    }
</script>

</body>
</html>
